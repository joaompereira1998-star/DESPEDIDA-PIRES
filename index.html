<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Despedida do Tiago Pires 🚗</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(180deg, #08101d 0%, #10233f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(1100px, 100%);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .hero {
      position: relative;
      min-height: 260px;
      background-image: url("algarve.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.20), rgba(0,0,0,0.50));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 34px 24px 28px;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.3rem);
      line-height: 1.05;
      text-shadow: 0 3px 14px rgba(0,0,0,0.35);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 1.05rem;
      opacity: 0.95;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .quote {
      margin-top: 18px;
      font-size: 1.15rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .map-section {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0c1729;
      overflow: hidden;
    }

    .map-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.98;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 25%, rgba(255,255,255,0.05), transparent 22%),
        radial-gradient(circle at 75% 18%, rgba(255,255,255,0.04), transparent 18%),
        linear-gradient(180deg, rgba(5,10,20,0.08), rgba(5,10,20,0.18));
      pointer-events: none;
    }

    .route-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .city-label {
      fill: white;
      font-size: 22px;
      font-weight: bold;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.45);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .city-dot {
      fill: #ffffff;
      stroke: rgba(0,0,0,0.3);
      stroke-width: 2px;
    }

    .route-path {
      fill: none;
      stroke: rgba(255,255,255,0.95);
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 18 12;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
    }

    .route-progress {
      fill: none;
      stroke: rgba(255, 196, 87, 0.98);
      stroke-width: 9;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1;
      filter: drop-shadow(0 0 12px rgba(255,196,87,0.40));
      opacity: 0.96;
    }

    .car {
      font-size: 34px;
      dominant-baseline: middle;
      text-anchor: middle;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.45));
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 20px 24px 28px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px 12px;
      text-align: center;
    }

    .number {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: bold;
      line-height: 1;
      margin-bottom: 8px;
    }

    .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .footer-text {
      text-align: center;
      padding: 0 24px 28px;
      font-size: 1.05rem;
      opacity: 0.95;
    }

    @media (max-width: 780px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .city-label {
        font-size: 18px;
      }

      .car {
        font-size: 28px;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
      }

      .hero-content {
        padding: 28px 16px 22px;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
        padding: 16px 16px 20px;
      }

      .footer-text {
        padding: 0 16px 20px;
      }

      .city-label {
        font-size: 14px;
      }

      .car {
        font-size: 24px;
      }

      .quote {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-content">
        <div class="eyebrow">Contagem decrescente</div>
        <h1>Despedida do Tiago Pires 🚗</h1>
        <div class="subtitle">De Lisboa até ao Algarve — quilómetro a quilómetro até 1 de maio</div>
        <div class="quote">façam as malas. vamos arrancar.</div>
      </div>
    </div>

    <div class="map-section">
      <img src="map.svg" alt="Mapa de Portugal" class="map-bg" />
      <div class="overlay"></div>

      <svg class="route-layer" viewBox="0 0 1600 900" preserveAspectRatio="none">
        <path
          id="roadPath"
          class="route-path"
          d="M 760 170 C 760 250, 760 320, 740 390 C 720 470, 700 560, 680 700"
        />
        <path
          id="progressPath"
          class="route-progress"
          d="M 760 170 C 760 250, 760 320, 740 390 C 720 470, 700 560, 680 700"
        />

        <circle class="city-dot" cx="760" cy="170" r="8" />
        <circle class="city-dot" cx="680" cy="700" r="8" />

        <text class="city-label" x="785" y="160">Lisboa</text>
        <text class="city-label" x="705" y="690">Algarve</text>

        <text id="car" class="car" x="760" y="170">🚗</text>
      </svg>
    </div>

    <div class="stats">
      <div class="card">
        <div class="number" id="days">0</div>
        <div class="label">Dias</div>
      </div>
      <div class="card">
        <div class="number" id="hours">0</div>
        <div class="label">Horas</div>
      </div>
      <div class="card">
        <div class="number" id="minutes">0</div>
        <div class="label">Minutos</div>
      </div>
      <div class="card">
        <div class="number" id="percent">0%</div>
        <div class="label">Percurso</div>
      </div>
    </div>

    <div class="footer-text" id="message">
      A road trip está a aquecer.
    </div>
  </div>

  <script>
    const startDate = new Date();
    const tripDate = new Date("2026-05-01T00:00:00");

    const path = document.getElementById("roadPath");
    const progressPath = document.getElementById("progressPath");
    const car = document.getElementById("car");

    const totalPathLength = path.getTotalLength();

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function updateCountdown() {
      const now = new Date();

      const totalDuration = tripDate - startDate;
      const elapsedDuration = now - startDate;
      const remainingDuration = tripDate - now;

      let progress = elapsedDuration / totalDuration;
      progress = clamp(progress, 0, 1);

      const currentPoint = path.getPointAtLength(totalPathLength * progress);
      const aheadPoint = path.getPointAtLength(
        Math.min(totalPathLength, totalPathLength * progress + 1)
      );

      const angle = Math.atan2(
        aheadPoint.y - currentPoint.y,
        aheadPoint.x - currentPoint.x
      ) * (180 / Math.PI);

      car.setAttribute("x", currentPoint.x);
      car.setAttribute("y", currentPoint.y);
      car.setAttribute("transform", `rotate(${angle}, ${currentPoint.x}, ${currentPoint.y})`);

      progressPath.style.strokeDasharray = `${totalPathLength * progress} ${totalPathLength}`;
      document.getElementById("percent").textContent = `${Math.round(progress * 100)}%`;

      if (remainingDuration <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "0";
        document.getElementById("minutes").textContent = "0";
        document.getElementById("percent").textContent = "100%";
        car.setAttribute("x", 680);
        car.setAttribute("y", 700);
        progressPath.style.strokeDasharray = `${totalPathLength} 0`;
        document.getElementById("message").textContent = "É hoje. Façam as malas. Vamos arrancar. 🚗☀️";
        return;
      }

      const days = Math.floor(remainingDuration / (1000 * 60 * 60 * 24));
      const hours = Math.floor((remainingDuration / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((remainingDuration / (1000 * 60)) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;

      if (progress <= 0.05) {
        document.getElementById("message").textContent = "Motor ligado. A contagem para o Algarve já começou.";
      } else if (progress < 0.5) {
        document.getElementById("message").textContent = "A despedida do Tiago Pires já vai a caminho.";
      } else if (progress < 1) {
        document.getElementById("message").textContent = "O Algarve está mesmo aí. Façam as malas.";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
